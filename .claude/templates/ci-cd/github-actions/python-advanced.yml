name: CI/CD Pipeline — Advanced

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-test-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v3
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Lint with flake8
        run: flake8 .
      - name: Format check with black
        run: black --check .
      - name: Run unit tests with coverage
        run: pytest --cov=./ --cov-report=xml
      - name: Security scan with bandit
        run: bandit -r . -f json -o bandit-report.json
        continue-on-error: true
      - name: Build
        run: python setup.py build
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3

  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v3
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run integration tests
        run: pytest --integration
      - name: Archive test results
        uses: actions/upload-artifact@v3
        with:
          name: integration-test-results
          path: ./test-results.json

  deploy-develop:
    needs: [lint-test-security, integration-tests]
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: develop
    steps:
      - uses: actions/checkout@v3
      - name: Deploy to Develop
        run: echo "Deploying to develop"
      - name: Send Slack Notification
        run: echo "Deployment to develop complete"

  deploy-staging:
    needs: [lint-test-security, integration-tests]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v3
      - name: Deploy to Staging
        run: echo "Deploying to staging"
      - name: Health Check
        run: echo "Checking staging health"
      - name: Send Slack Notification
        run: echo "Deployment to staging complete"

  deploy-production:
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v3
      - name: Create Git tag
        run: git tag -a "release-$(date +%Y%m%d-%H%M%S)" -m "Production release"
      - name: Deploy to Production
        run: echo "Deploying to production"
      - name: Health Check
        run: echo "Checking production health"
      - name: Send Slack Notification
        run: echo "Deployment to production complete — {{APP_NAME}}"
