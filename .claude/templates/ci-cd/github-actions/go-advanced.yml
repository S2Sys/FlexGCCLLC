name: CI/CD Pipeline — Advanced

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-test-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Go
        uses: actions/setup-go@v3
        with:
          go-version: '1.21'
      - name: Get dependencies
        run: go get -v -t -d ./...
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v3
        with:
          version: latest
      - name: Run unit tests with coverage
        run: go test -v -coverprofile=coverage.out ./...
      - name: Security scan with gosec
        uses: securego/gosec@master
        with:
          args: '-no-fail -fmt json -out gosec-report.json ./...'
        continue-on-error: true
      - name: Build
        run: go build -o {{APP_NAME}}
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.out

  benchmark-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Go
        uses: actions/setup-go@v3
        with:
          go-version: '1.21'
      - name: Get dependencies
        run: go get -v -t -d ./...
      - name: Run benchmark tests
        run: go test -bench=. -benchmem ./... > benchmark-results.txt
      - name: Archive benchmark results
        uses: actions/upload-artifact@v3
        with:
          name: benchmark-results
          path: ./benchmark-results.txt

  deploy-develop:
    needs: [lint-test-security, benchmark-tests]
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: develop
    steps:
      - uses: actions/checkout@v3
      - name: Deploy to Develop
        run: echo "Deploying to develop"
      - name: Send Slack Notification
        run: echo "Deployment to develop complete"

  deploy-staging:
    needs: [lint-test-security, benchmark-tests]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v3
      - name: Deploy to Staging
        run: echo "Deploying to staging"
      - name: Health Check
        run: echo "Checking staging health"
      - name: Send Slack Notification
        run: echo "Deployment to staging complete"

  deploy-production:
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v3
      - name: Create Git tag
        run: git tag -a "release-$(date +%Y%m%d-%H%M%S)" -m "Production release"
      - name: Deploy to Production
        run: echo "Deploying to production"
      - name: Health Check
        run: echo "Checking production health"
      - name: Send Slack Notification
        run: echo "Deployment to production complete — {{APP_NAME}}"
