name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Go
        uses: actions/setup-go@v3
        with:
          go-version: '1.21'
      - name: Get dependencies
        run: go get -v -t -d ./...
      - name: Run tests
        run: go test -v ./...
      - name: Build
        run: go build -o {{APP_NAME}}
      - name: Deploy to {{DEPLOY_ENV}}
        run: echo "Deploying to {{DEPLOY_ENV}}"
        env:
          GO_ENV: {{DEPLOY_ENV}}
          APP_NAME: {{APP_NAME}}
