name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0'
      - name: Restore dependencies
        run: dotnet restore
      - name: Build
        run: dotnet build
      - name: Run tests
        run: dotnet test --filter Category=Unit --no-build
      - name: Deploy to {{DEPLOY_ENV}}
        run: echo "Deploying to {{DEPLOY_ENV}}"
        env:
          DOTNET_ENV: {{DEPLOY_ENV}}
          APP_NAME: {{APP_NAME}}
