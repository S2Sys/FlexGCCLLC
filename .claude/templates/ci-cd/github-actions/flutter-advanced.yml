name: CI/CD Pipeline — Advanced

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-test-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
      - name: Get dependencies
        run: flutter pub get
      - name: Analyze code
        run: flutter analyze
      - name: Run unit tests with coverage
        run: flutter test --coverage
      - name: Run integration tests
        run: flutter test integration_test/
      - name: Security scan (dart pub audit)
        run: dart pub audit
        continue-on-error: true
      - name: Build APK Release
        run: flutter build apk --release
      - name: Build iOS Release
        run: flutter build ios --release --no-codesign
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info

  performance-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
      - name: Get dependencies
        run: flutter pub get
      - name: Run performance tests
        run: flutter test test/performance_test.dart
      - name: Archive performance results
        uses: actions/upload-artifact@v3
        with:
          name: performance-results
          path: ./performance-report.json

  deploy-develop:
    needs: [lint-test-security, performance-test]
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: develop
    steps:
      - uses: actions/checkout@v3
      - name: Deploy to Develop
        run: echo "Deploying to develop"
      - name: Send Slack Notification
        run: echo "Deployment to develop complete"

  deploy-staging:
    needs: [lint-test-security, performance-test]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v3
      - name: Deploy to Staging
        run: echo "Deploying to staging"
      - name: Health Check
        run: echo "Checking staging health"
      - name: Send Slack Notification
        run: echo "Deployment to staging complete"

  deploy-production:
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v3
      - name: Create Git tag
        run: git tag -a "release-$(date +%Y%m%d-%H%M%S)" -m "Production release"
      - name: Deploy to Production
        run: echo "Deploying to production"
      - name: Health Check
        run: echo "Checking production health"
      - name: Send Slack Notification
        run: echo "Deployment to production complete — {{APP_NAME}}"
