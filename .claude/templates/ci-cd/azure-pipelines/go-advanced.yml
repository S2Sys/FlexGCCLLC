trigger:
  - main
  - develop

pool:
  vmImage: 'ubuntu-latest'

variables:
  goVersion: '1.21'

stages:
  - stage: Build
    displayName: 'Build & Test'
    jobs:
      - job: BuildJob
        displayName: 'Go Build'
        steps:
          - task: GoTool@0
            inputs:
              version: $(goVersion)
            displayName: 'Install Go'

          - script: go get -v -t -d ./...
            displayName: 'Get Dependencies'

          - script: golangci-lint run ./...
            displayName: 'Run Linter'

          - script: go test -v -coverprofile=coverage.out ./...
            displayName: 'Run Tests with Coverage'

          - script: gosec ./...
            displayName: 'Security Scanning (Gosec)'

          - task: PublishCodeCoverageResults@1
            inputs:
              codeCoverageTool: GoCover
              summaryFileLocation: '$(System.DefaultWorkingDirectory)/coverage.out'
            displayName: 'Publish Coverage Report'

          - script: go build -o app
            displayName: 'Build Application'

          - task: PublishBuildArtifacts@1
            inputs:
              pathToPublish: '.'
              artifactName: 'go-app'
            displayName: 'Publish Artifacts'

  - stage: Deploy_Develop
    displayName: 'Deploy to Develop'
    dependsOn: Build
    condition: eq(variables['Build.SourceBranch'], 'refs/heads/develop')
    jobs:
      - deployment: DeployDevelop
        displayName: 'Deploy to Develop'
        environment: 'develop'
        strategy:
          runOnce:
            deploy:
              steps:
                - script: echo Deploying to develop environment
                  displayName: 'Deploy to Develop'

  - stage: Deploy_Staging
    displayName: 'Deploy to Staging'
    dependsOn: Build
    condition: eq(variables['Build.SourceBranch'], 'refs/heads/main')
    jobs:
      - deployment: DeployStaging
        displayName: 'Deploy to Staging'
        environment: 'staging'
        strategy:
          runOnce:
            deploy:
              steps:
                - script: echo Deploying to staging environment
                  displayName: 'Deploy to Staging'

  - stage: Deploy_Production
    displayName: 'Deploy to Production'
    dependsOn: Deploy_Staging
    condition: eq(variables['Build.SourceBranch'], 'refs/heads/main')
    jobs:
      - deployment: DeployProduction
        displayName: 'Deploy to Production'
        environment: 'production'
        strategy:
          runOnce:
            deploy:
              steps:
                - script: echo Deploying to production environment
                  displayName: 'Deploy to Production'
