trigger:
  - main
  - develop

pool:
  vmImage: 'ubuntu-latest'

variables:
  javaVersion: '17'

stages:
  - stage: Build
    displayName: 'Build & Test'
    jobs:
      - job: BuildJob
        displayName: 'Java Build'
        steps:
          - task: JavaToolInstaller@0
            inputs:
              versionSpec: $(javaVersion)
            displayName: 'Install Java'

          - script: mvn clean checkstyle:check
            displayName: 'Run Code Quality Checks'

          - script: mvn clean install -DskipITs
            displayName: 'Build and Unit Tests'

          - script: mvn jacoco:report
            displayName: 'Generate Coverage Report'

          - task: PublishCodeCoverageResults@1
            inputs:
              codeCoverageTool: JaCoCo
              summaryFileLocation: '$(System.DefaultWorkingDirectory)/target/site/jacoco/jacoco.xml'
            displayName: 'Publish Coverage Report'

          - script: mvn verify
            displayName: 'Run Integration Tests'

          - script: mvn org.owasp:dependency-check-maven:check
            displayName: 'Security Scanning (OWASP Dependency Check)'

          - script: mvn package
            displayName: 'Package Application'

          - task: PublishBuildArtifacts@1
            inputs:
              pathToPublish: 'target'
              artifactName: 'java-app'
            displayName: 'Publish Artifacts'

  - stage: Deploy_Develop
    displayName: 'Deploy to Develop'
    dependsOn: Build
    condition: eq(variables['Build.SourceBranch'], 'refs/heads/develop')
    jobs:
      - deployment: DeployDevelop
        displayName: 'Deploy to Develop'
        environment: 'develop'
        strategy:
          runOnce:
            deploy:
              steps:
                - script: echo Deploying to develop environment
                  displayName: 'Deploy to Develop'

  - stage: Deploy_Staging
    displayName: 'Deploy to Staging'
    dependsOn: Build
    condition: eq(variables['Build.SourceBranch'], 'refs/heads/main')
    jobs:
      - deployment: DeployStaging
        displayName: 'Deploy to Staging'
        environment: 'staging'
        strategy:
          runOnce:
            deploy:
              steps:
                - script: echo Deploying to staging environment
                  displayName: 'Deploy to Staging'

  - stage: Deploy_Production
    displayName: 'Deploy to Production'
    dependsOn: Deploy_Staging
    condition: eq(variables['Build.SourceBranch'], 'refs/heads/main')
    jobs:
      - deployment: DeployProduction
        displayName: 'Deploy to Production'
        environment: 'production'
        strategy:
          runOnce:
            deploy:
              steps:
                - script: echo Deploying to production environment
                  displayName: 'Deploy to Production'
