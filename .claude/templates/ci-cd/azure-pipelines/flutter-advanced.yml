trigger:
  - main
  - develop

pool:
  vmImage: 'ubuntu-latest'

stages:
  - stage: Build
    displayName: 'Build & Test'
    jobs:
      - job: BuildJob
        displayName: 'Flutter Build'
        steps:
          - task: FlutterInstall@0
            displayName: 'Install Flutter'

          - script: flutter pub get
            displayName: 'Get Dependencies'

          - script: flutter analyze
            displayName: 'Run Analysis'

          - script: flutter test --coverage
            displayName: 'Run Tests with Coverage'

          - task: PublishCodeCoverageResults@1
            inputs:
              codeCoverageTool: Cobertura
              summaryFileLocation: '$(System.DefaultWorkingDirectory)/coverage/lcov.info'
            displayName: 'Publish Coverage Report'

          - script: flutter test --performance
            displayName: 'Run Performance Tests'

          - script: |
              flutter pub get
              flutter pub pub global activate coverage
              pub global run coverage:format_coverage --packages=.packages --report-on=lib --out=coverage/lcov.info --lcov
            displayName: 'Generate Coverage Metrics'

          - script: flutter build apk --release
            displayName: 'Build APK (Release)'

          - task: PublishBuildArtifacts@1
            inputs:
              pathToPublish: 'build/app/outputs'
              artifactName: 'flutter-app'
            displayName: 'Publish Artifacts'

  - stage: Deploy_Develop
    displayName: 'Deploy to Develop'
    dependsOn: Build
    condition: eq(variables['Build.SourceBranch'], 'refs/heads/develop')
    jobs:
      - deployment: DeployDevelop
        displayName: 'Deploy to Develop'
        environment: 'develop'
        strategy:
          runOnce:
            deploy:
              steps:
                - script: echo Deploying to develop environment
                  displayName: 'Deploy to Develop'

  - stage: Deploy_Staging
    displayName: 'Deploy to Staging'
    dependsOn: Build
    condition: eq(variables['Build.SourceBranch'], 'refs/heads/main')
    jobs:
      - deployment: DeployStaging
        displayName: 'Deploy to Staging'
        environment: 'staging'
        strategy:
          runOnce:
            deploy:
              steps:
                - script: echo Deploying to staging environment
                  displayName: 'Deploy to Staging'

  - stage: Deploy_Production
    displayName: 'Deploy to Production'
    dependsOn: Deploy_Staging
    condition: eq(variables['Build.SourceBranch'], 'refs/heads/main')
    jobs:
      - deployment: DeployProduction
        displayName: 'Deploy to Production'
        environment: 'production'
        strategy:
          runOnce:
            deploy:
              steps:
                - script: echo Deploying to production environment
                  displayName: 'Deploy to Production'
