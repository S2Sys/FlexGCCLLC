trigger:
  - main
  - develop

pool:
  vmImage: 'ubuntu-latest'

variables:
  dotnetVersion: '7.0'

stages:
  - stage: Build
    displayName: 'Build & Test'
    jobs:
      - job: BuildJob
        displayName: '.NET Build'
        steps:
          - task: UseDotNet@2
            inputs:
              version: $(dotnetVersion)
            displayName: 'Install .NET'

          - script: dotnet restore
            displayName: 'Restore Dependencies'

          - script: dotnet format --verify-no-changes
            displayName: 'Check Code Formatting'

          - script: dotnet build
            displayName: 'Build Application'

          - script: dotnet test --logger "trx" --collect:"XPlat Code Coverage"
            displayName: 'Run Tests with Coverage'

          - task: PublishCodeCoverageResults@1
            inputs:
              codeCoverageTool: Cobertura
              summaryFileLocation: '$(Agent.TempDirectory)/**/coverage.cobertura.xml'
            displayName: 'Publish Coverage Report'

          - script: dotnet list package --vulnerable
            displayName: 'Security Scanning (Vulnerable Packages)'

          - script: dotnet publish -c Release
            displayName: 'Publish Application'

          - task: PublishBuildArtifacts@1
            inputs:
              pathToPublish: 'bin/Release'
              artifactName: 'dotnet-app'
            displayName: 'Publish Artifacts'

  - stage: Deploy_Develop
    displayName: 'Deploy to Develop'
    dependsOn: Build
    condition: eq(variables['Build.SourceBranch'], 'refs/heads/develop')
    jobs:
      - deployment: DeployDevelop
        displayName: 'Deploy to Develop'
        environment: 'develop'
        strategy:
          runOnce:
            deploy:
              steps:
                - script: echo Deploying to develop environment
                  displayName: 'Deploy to Develop'

  - stage: Deploy_Staging
    displayName: 'Deploy to Staging'
    dependsOn: Build
    condition: eq(variables['Build.SourceBranch'], 'refs/heads/main')
    jobs:
      - deployment: DeployStaging
        displayName: 'Deploy to Staging'
        environment: 'staging'
        strategy:
          runOnce:
            deploy:
              steps:
                - script: echo Deploying to staging environment
                  displayName: 'Deploy to Staging'

  - stage: Deploy_Production
    displayName: 'Deploy to Production'
    dependsOn: Deploy_Staging
    condition: eq(variables['Build.SourceBranch'], 'refs/heads/main')
    jobs:
      - deployment: DeployProduction
        displayName: 'Deploy to Production'
        environment: 'production'
        strategy:
          runOnce:
            deploy:
              steps:
                - script: echo Deploying to production environment
                  displayName: 'Deploy to Production'
