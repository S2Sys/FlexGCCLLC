trigger:
  - main
  - develop

pool:
  vmImage: 'ubuntu-latest'

variables:
  goVersion: '1.21'

stages:
  - stage: Build
    displayName: 'Build & Test'
    jobs:
      - job: BuildJob
        displayName: 'Go Build'
        steps:
          - task: GoTool@0
            inputs:
              version: $(goVersion)
            displayName: 'Install Go'

          - script: go get -v -t -d ./...
            displayName: 'Get Dependencies'

          - script: go test -v ./...
            displayName: 'Run Tests'

          - script: go build -o app
            displayName: 'Build Application'
