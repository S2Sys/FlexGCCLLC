stages:
  - build
  - test
  - security
  - deploy

image: cirrusci/flutter:stable

variables:
  FLUTTER_HOME: $CI_PROJECT_DIR/.flutter
  PUB_CACHE: $CI_PROJECT_DIR/.pub-cache

cache:
  paths:
    - .pub-cache/
    - .flutter/

before_script:
  - flutter pub get
  - flutter pub global activate melos

build:
  stage: build
  script:
    - flutter analyze
    - flutter build apk --split-per-abi
    - flutter build ios --no-codesign
  artifacts:
    paths:
      - build/app/outputs/
    expire_in: 1 week
  only:
    - develop
    - main

test:
  stage: test
  script:
    - flutter test --coverage
    - genhtml coverage/lcov.info -o coverage/html
  artifacts:
    paths:
      - coverage/
    expire_in: 1 week
  coverage: '/lines:\s*(\d+.\d+)%/'
  only:
    - develop
    - main

security_scan:
  stage: security
  script:
    - flutter pub global run pana . --json > pana-report.json || true
  artifacts:
    reports:
      sast: pana-report.json
    expire_in: 1 week
  allow_failure: true
  only:
    - develop
    - main

deploy_develop:
  stage: deploy
  environment:
    name: development
    url: https://dev.example.com
    deployment_tier: development
  script:
    - echo "Deploying to development environment"
  artifacts:
    reports:
      deployment: deployment.json
  only:
    - develop
  when: on_success

deploy_staging:
  stage: deploy
  environment:
    name: staging
    url: https://staging.example.com
    deployment_tier: staging
  script:
    - echo "Deploying to staging environment"
  artifacts:
    reports:
      deployment: deployment.json
  only:
    - main
  when: on_success

deploy_production:
  stage: deploy
  environment:
    name: production
    url: https://example.com
    deployment_tier: production
  script:
    - echo "Deploying to production environment"
  artifacts:
    reports:
      deployment: deployment.json
  only:
    - main
  when: manual
