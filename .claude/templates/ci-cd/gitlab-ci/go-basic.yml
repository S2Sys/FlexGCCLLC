stages:
  - build
  - deploy

image: golang:1.21

before_script:
  - go get -v ./...

build:
  stage: build
  script:
    - go test ./...
    - go build -o app
  artifacts:
    paths:
      - app
    expire_in: 1 week
  only:
    - develop
    - main

deploy_develop:
  stage: deploy
  environment:
    name: development
    url: https://dev.example.com
  script:
    - echo "Deploying to development environment"
  only:
    - develop
  when: on_success
