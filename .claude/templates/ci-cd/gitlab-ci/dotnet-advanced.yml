stages:
  - build
  - test
  - security
  - deploy

image: mcr.microsoft.com/dotnet/sdk:7.0

variables:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"

cache:
  paths:
    - .nuget/

before_script:
  - dotnet restore

build:
  stage: build
  script:
    - dotnet build --no-restore --configuration Release --verbosity minimal
    - dotnet publish -c Release -o publish
  artifacts:
    paths:
      - publish/
    expire_in: 1 week
  only:
    - develop
    - main

test:
  stage: test
  script:
    - dotnet test --no-build --verbosity minimal --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage" -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover
  artifacts:
    reports:
      junit:
        - "**/test-results.trx"
      coverage_report:
        coverage_format: cobertura
        path: "**/coverage.cobertura.xml"
    paths:
      - "**/test-results.trx"
      - "**/coverage.cobertura.xml"
    expire_in: 1 week
  coverage: '/Covered:.*?([0-9.]+)%/'
  only:
    - develop
    - main

security_scan:
  stage: security
  script:
    - dotnet tool install --global SecurityCodeScan || true
    - dotnet build --no-restore --configuration Release /p:EnableSecurityCodeScan=true || true
  allow_failure: true
  only:
    - develop
    - main

deploy_develop:
  stage: deploy
  environment:
    name: development
    url: https://dev.example.com
    deployment_tier: development
  script:
    - echo "Deploying to development environment"
  artifacts:
    reports:
      deployment: deployment.json
  only:
    - develop
  when: on_success

deploy_staging:
  stage: deploy
  environment:
    name: staging
    url: https://staging.example.com
    deployment_tier: staging
  script:
    - echo "Deploying to staging environment"
  artifacts:
    reports:
      deployment: deployment.json
  only:
    - main
  when: on_success

deploy_production:
  stage: deploy
  environment:
    name: production
    url: https://example.com
    deployment_tier: production
  script:
    - echo "Deploying to production environment"
  artifacts:
    reports:
      deployment: deployment.json
  only:
    - main
  when: manual
