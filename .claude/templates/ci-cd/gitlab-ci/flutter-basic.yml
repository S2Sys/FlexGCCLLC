stages:
  - build
  - deploy

image: cirrusci/flutter:stable

before_script:
  - flutter pub get

build:
  stage: build
  script:
    - flutter test
    - flutter build apk
  artifacts:
    paths:
      - build/app/outputs/
    expire_in: 1 week
  only:
    - develop
    - main

deploy_develop:
  stage: deploy
  environment:
    name: development
    url: https://dev.example.com
  script:
    - echo "Deploying to development environment"
  only:
    - develop
  when: on_success
