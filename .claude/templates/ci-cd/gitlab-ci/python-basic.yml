stages:
  - build
  - deploy

image: python:3.11

before_script:
  - pip install -r requirements.txt

build:
  stage: build
  script:
    - python -m pytest
    - python setup.py build
  artifacts:
    paths:
      - build/
    expire_in: 1 week
  only:
    - develop
    - main

deploy_develop:
  stage: deploy
  environment:
    name: development
    url: https://dev.example.com
  script:
    - echo "Deploying to development environment"
  only:
    - develop
  when: on_success
