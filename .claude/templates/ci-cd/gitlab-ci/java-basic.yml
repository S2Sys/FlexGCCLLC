stages:
  - build
  - deploy

image: maven:3.8-openjdk-17

before_script:
  - echo "Starting Maven build"

build:
  stage: build
  script:
    - mvn clean install -DskipTests
  artifacts:
    paths:
      - target/
    expire_in: 1 week
  only:
    - develop
    - main

deploy_develop:
  stage: deploy
  environment:
    name: development
    url: https://dev.example.com
  script:
    - echo "Deploying to development environment"
  only:
    - develop
  when: on_success
