stages:
  - build
  - test
  - deploy

image: golang:1.21

before_script:
  - go get -v ./...

build:
  stage: build
  script:
    - go fmt ./...
    - go vet ./...
    - go build -o app
  artifacts:
    paths:
      - app
    expire_in: 1 week
  only:
    - develop
    - main

test:
  stage: test
  script:
    - go test -v -race -coverprofile=coverage.out ./...
  coverage: '/total:\s+\(statements\)\s+(\d+.\d+)%/'
  only:
    - develop
    - main

deploy_develop:
  stage: deploy
  environment:
    name: development
    url: https://dev.example.com
  script:
    - echo "Deploying to development environment"
  only:
    - develop
  when: on_success

deploy_staging:
  stage: deploy
  environment:
    name: staging
    url: https://staging.example.com
  script:
    - echo "Deploying to staging environment"
  only:
    - main
  when: on_success
