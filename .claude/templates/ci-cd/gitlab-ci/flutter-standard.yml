stages:
  - build
  - test
  - deploy

image: cirrusci/flutter:stable

cache:
  paths:
    - .pub-cache/

before_script:
  - flutter pub get

build:
  stage: build
  script:
    - flutter analyze
    - flutter build apk
  artifacts:
    paths:
      - build/app/outputs/
    expire_in: 1 week
  only:
    - develop
    - main

test:
  stage: test
  script:
    - flutter test --coverage
  artifacts:
    paths:
      - coverage/
    expire_in: 1 week
  coverage: '/lines:\s*(\d+.\d+)%/'
  only:
    - develop
    - main

deploy_develop:
  stage: deploy
  environment:
    name: development
    url: https://dev.example.com
  script:
    - echo "Deploying to development environment"
  only:
    - develop
  when: on_success

deploy_staging:
  stage: deploy
  environment:
    name: staging
    url: https://staging.example.com
  script:
    - echo "Deploying to staging environment"
  only:
    - main
  when: on_success
