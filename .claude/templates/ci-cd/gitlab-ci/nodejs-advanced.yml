stages:
  - build
  - test
  - security
  - deploy

image: node:18

variables:
  npm_cache_dir: $CI_PROJECT_DIR/.npm

cache:
  paths:
    - node_modules/
    - .npm/

before_script:
  - npm ci --cache .npm

build:
  stage: build
  script:
    - npm run lint
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 week
  only:
    - develop
    - main

test:
  stage: test
  script:
    - npm run test -- --coverage
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    paths:
      - coverage/
    expire_in: 1 week
  coverage: '/Lines\s*:\s*(\d+.\d+)%/'
  only:
    - develop
    - main

security_scan:
  stage: security
  script:
    - npm audit
  allow_failure: true
  only:
    - develop
    - main

deploy_develop:
  stage: deploy
  environment:
    name: development
    url: https://dev.example.com
    deployment_tier: development
  script:
    - echo "Deploying to development environment"
  artifacts:
    reports:
      deployment: deployment.json
  only:
    - develop
  when: on_success

deploy_staging:
  stage: deploy
  environment:
    name: staging
    url: https://staging.example.com
    deployment_tier: staging
  script:
    - echo "Deploying to staging environment"
  artifacts:
    reports:
      deployment: deployment.json
  only:
    - main
  when: on_success

deploy_production:
  stage: deploy
  environment:
    name: production
    url: https://example.com
    deployment_tier: production
  script:
    - echo "Deploying to production environment"
  artifacts:
    reports:
      deployment: deployment.json
  only:
    - main
  when: manual
