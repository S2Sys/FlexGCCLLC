stages:
  - build
  - test
  - security
  - deploy

image: maven:3.8-openjdk-17

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  SONAR_HOST_URL: "https://sonarqube.example.com"

cache:
  paths:
    - .m2/repository/

before_script:
  - echo "Starting Maven build"

build:
  stage: build
  script:
    - mvn clean package -DskipTests -X
  artifacts:
    paths:
      - target/
    expire_in: 1 week
  only:
    - develop
    - main

test:
  stage: test
  script:
    - mvn test jacoco:report
  artifacts:
    reports:
      junit:
        - target/surefire-reports/TEST-*.xml
    paths:
      - target/
      - target/site/jacoco/
    expire_in: 1 week
  coverage: '/Covered Branches[^%]*([0-9.]+)%/'
  only:
    - develop
    - main

security_scan:
  stage: security
  script:
    - mvn sonar:sonar -Dsonar.qualitygate.wait=true || true
  allow_failure: true
  only:
    - develop
    - main

deploy_develop:
  stage: deploy
  environment:
    name: development
    url: https://dev.example.com
    deployment_tier: development
  script:
    - echo "Deploying to development environment"
  artifacts:
    reports:
      deployment: deployment.json
  only:
    - develop
  when: on_success

deploy_staging:
  stage: deploy
  environment:
    name: staging
    url: https://staging.example.com
    deployment_tier: staging
  script:
    - echo "Deploying to staging environment"
  artifacts:
    reports:
      deployment: deployment.json
  only:
    - main
  when: on_success

deploy_production:
  stage: deploy
  environment:
    name: production
    url: https://example.com
    deployment_tier: production
  script:
    - echo "Deploying to production environment"
  artifacts:
    reports:
      deployment: deployment.json
  only:
    - main
  when: manual
