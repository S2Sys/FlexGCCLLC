stages:
  - build
  - test
  - security
  - deploy

image: golang:1.21

variables:
  GOFLAGS: -mod=readonly
  GOCACHE: $CI_PROJECT_DIR/.go-cache

cache:
  paths:
    - .go-cache/
    - vendor/

before_script:
  - go mod download
  - go get -v ./...

build:
  stage: build
  script:
    - go fmt ./...
    - go vet ./...
    - go build -o app -ldflags="-X main.version=$CI_COMMIT_SHA"
  artifacts:
    paths:
      - app
    expire_in: 1 week
  only:
    - develop
    - main

test:
  stage: test
  script:
    - go test -v -race -coverprofile=coverage.out -covermode=atomic ./...
    - go tool cover -html=coverage.out -o coverage.html
  artifacts:
    paths:
      - coverage.html
    expire_in: 1 week
  coverage: '/total:\s+\(statements\)\s+(\d+.\d+)%/'
  only:
    - develop
    - main

security_scan:
  stage: security
  script:
    - go install github.com/securego/gosec/v2/cmd/gosec@latest
    - gosec -fmt json -out gosec-report.json ./... || true
  artifacts:
    reports:
      sast: gosec-report.json
    expire_in: 1 week
  allow_failure: true
  only:
    - develop
    - main

deploy_develop:
  stage: deploy
  environment:
    name: development
    url: https://dev.example.com
    deployment_tier: development
  script:
    - echo "Deploying to development environment"
  artifacts:
    reports:
      deployment: deployment.json
  only:
    - develop
  when: on_success

deploy_staging:
  stage: deploy
  environment:
    name: staging
    url: https://staging.example.com
    deployment_tier: staging
  script:
    - echo "Deploying to staging environment"
  artifacts:
    reports:
      deployment: deployment.json
  only:
    - main
  when: on_success

deploy_production:
  stage: deploy
  environment:
    name: production
    url: https://example.com
    deployment_tier: production
  script:
    - echo "Deploying to production environment"
  artifacts:
    reports:
      deployment: deployment.json
  only:
    - main
  when: manual
