stages:
  - build
  - test
  - deploy

image: python:3.11

before_script:
  - pip install -r requirements.txt

build:
  stage: build
  script:
    - python -m flake8 .
    - python setup.py build
  artifacts:
    paths:
      - build/
    expire_in: 1 week
  only:
    - develop
    - main

test:
  stage: test
  script:
    - python -m pytest --cov=. --cov-report=xml
  coverage: '/TOTAL.*\s+(\d+%)$/'
  only:
    - develop
    - main

deploy_develop:
  stage: deploy
  environment:
    name: development
    url: https://dev.example.com
  script:
    - echo "Deploying to development environment"
  only:
    - develop
  when: on_success

deploy_staging:
  stage: deploy
  environment:
    name: staging
    url: https://staging.example.com
  script:
    - echo "Deploying to staging environment"
  only:
    - main
  when: on_success
