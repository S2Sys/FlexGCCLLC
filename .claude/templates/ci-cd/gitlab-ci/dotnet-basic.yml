stages:
  - build
  - deploy

image: mcr.microsoft.com/dotnet/sdk:7.0

before_script:
  - dotnet restore

build:
  stage: build
  script:
    - dotnet build --no-restore
    - dotnet publish -c Release -o publish
  artifacts:
    paths:
      - publish/
    expire_in: 1 week
  only:
    - develop
    - main

deploy_develop:
  stage: deploy
  environment:
    name: development
    url: https://dev.example.com
  script:
    - echo "Deploying to development environment"
  only:
    - develop
  when: on_success
